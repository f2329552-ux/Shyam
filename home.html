<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidCoins Video Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full bg-gray-800 rounded-xl p-6 shadow-2xl border border-gray-700 text-center">
        <h1 class="text-2xl font-bold text-yellow-400 mb-2">💰 VidCoins Video Khojo</h1>
        <p class="text-gray-400 text-sm mb-6">Apne coins balance check karein aur videos khojein.</p>

        <div class="bg-gray-700 p-4 rounded-lg mb-6 border border-yellow-500/30">
            <p class="text-xs text-gray-400 uppercase tracking-wider">Aapke Coins</p>
            <p id="coins-balance" class="text-3xl font-extrabold text-yellow-400 mt-1">100</p>
        </div>

        <div class="space-y-3">
            <input type="text" id="channel-input" placeholder="Channel ka naam dalein..." class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 text-white focus:outline-none focus:border-yellow-400">
            <input type="text" id="topic-input" placeholder="Topic ya keyword..." class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 text-white focus:outline-none focus:border-yellow-400">
            <button onclick="searchVideos()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-950 font-bold p-3 rounded-lg transition duration-200">🔍 Search Videos</button>
        </div>

        <div class="mt-6 text-left">
            <h3 class="text-sm font-semibold text-gray-400 mb-2">Results</h3>
            <div id="results-box" class="bg-gray-900 p-4 rounded-lg border border-gray-700 text-sm text-gray-500 text-center">
                Search karne par videos yahan dikhenge...
            </div>
        </div>
    </div>

    <script>
        function searchVideos() {
            const channel = document.getElementById('channel-input').value;
            const topic = document.getElementById('topic-input').value;
            const resultsBox = document.getElementById('results-box');

            if(!channel && !topic) {
                alert('Kripya details bharein!');
                return;
            }

            resultsBox.classList.remove('text-gray-500', 'text-center');
            resultsBox.classList.add('text-white', 'text-left');
            resultsBox.innerHTML = `
                <div class="p-2 bg-gray-800 rounded border border-gray-700 mb-2">
                    <p class="font-bold text-yellow-400">✓ Video Mil Gaya</p>
                    <p class="text-xs text-gray-400">Channel: ${channel || 'All'}</p>
                    <p class="text-xs text-gray-400">Topic: ${topic || 'General'}</p>
                </div>
            `;
        }
    </script>
</body>
              </html>
